<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="./css-files/checkout-css/checkout.css">
    <link rel="stylesheet" href="./css-files/body-html.css">
    <link rel="stylesheet" href="./css-files/buttons.css">
    <LInk rel="icon" href="./image/logos/logo-02.png" type="image/x-icon"> <!-- web icon -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>  <!-- onlin icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">  <!-- onlin icons -->
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout</title>
</head>
<body>
    <div class="header">
        <div class="head-logo">
            <img src="./image/logos/logo1.png" alt="" class="logo-img">
            <h4 style="color: #002e3c;">A</h4>
            <h4>EYE</h4>
        </div>
        <div class="main-head">
            <h3 style="color: #002e3c;" id="cart-count">0</h3>
            <h3>&nbspItems</h3>
        </div>
        <div class="end-head">
            <a href="./index.html" class="backhome">Home</a>
        </div>
    </div>

    <div class="main">
        <div class="price">
            <div class="contaner">
              <h3>Order Summary</h3>
              <div class="price-line">
                <div class="line-1">
                  <h3 style="display: flex; margin: 0;" class="text-1" id="cart-count1">Items (0)</h3>
                </div>
                <div class="line-2">
                  <h3 style="margin: 0;" id="items-price">0</h3>
                </div>
              </div>
              <div class="price-line" style="display: block; height: max-content;" id="sayed-products">
              </div>
              <div class="price-line" style="margin-bottom: -15px;">
                <div class="line-1">
                  <h3 style="display: flex; margin: 0;" class="text-1">Shipping & handling:</h3>
                </div>
                <div class="line-2">
                  <h3 style="margin: 0;" id="shipping-price">0</h3>
                </div>
              </div>
              <div class="price-line">
                <div class="line-1"></div>
                <div class="line-2">
                  <hr style="margin-right: 55px; margin-left: 0px;">
                </div>
              </div>
              <div class="price-line" style="margin-top: -15px;">
                <div class="line-1">
                  <h3 style="display: flex; margin: 0;" class="text-1">Total before tax:</h3>
                </div>
                <div class="line-2">
                  <h3 style="margin: 0;" id="total-before-tax">0</h3>
                </div>
              </div>
              <div class="price-line">
                <div class="line-1">
                  <h3 style="display: flex; margin: 0;" class="text-1">Estimated tax (14%):</h3>
                </div>
                <div class="line-2">
                  <h3 id="tax" style="margin: 0;">0</h3>
                </div>
              </div>
              <hr style="margin-right: 40px; margin-left: 20px;">
              <div class="price-line" style="margin-top: 10px;">
                <div class="line-1">
                  <h3 style="display: flex; margin: 0;" class="text-2">Order total:</h3>
                </div>
                <div class="line-2">
                  <h3 id="final-price" style="margin: 0; color: #a10000;">0</h3>
                </div>
              </div>
              <button id="confirmOrder" class="palce-order">Place your order</button>
              <div class="payment">
                <h5 class="h5-orderpayment">Available payment method is cash only</h5>
              </div>
            </div>
          </div>
          
          <!-- Payment Modal -->
          <div id="paymentModal" class="modal">
            <div class="modal-content">
              <span class="close">&times;</span>
              <h2>Choose Payment Method</h2>
              <div class="payment-option" id="cashPayment">Cash on Delivery</div>
              <div class="payment-option" id="mobileWallet">Mobile Wallet</div>
              <div class="payment-option" id="instaPay">InstaPay</div>
              <div class="payment-option" id="cardPayment">Credit/Debit Card</div>
        
              <!-- Mobile Wallet Form -->
              <div id="mobileWalletForm" class="payment-form">
                <select id="walletProvider">
                  <option value="orange">Orange</option>
                  <option value="vodafone">Vodafone</option>
                  <option value="etisalat">Etisalat</option>
                </select>
                <input type="text" id="walletNumber" placeholder="Enter your wallet number">
                <button class="button-animation2" id="mobileWalletSubmit">Submit</button>
              </div>
        
              <!-- InstaPay Form -->
              <div id="instaPayForm" class="payment-form">
                <input type="text" id="instaPayNumber" placeholder="Enter your InstaPay number">
                <button class="button-animation2" id="instaPaySubmit">Submit</button>
              </div>
        
              <!-- Stripe Payment Form -->
              <div id="stripePaymentForm" class="payment-form">
                <div id="card-element"></div>
                <div id="card-errors" role="alert"></div>
                <button class="button-animation2 sayed" type="submit">Pay with Card</button>
              </div>
            </div>
          </div>
        <div class="proud">
            <div id="checkout-products"></div>
        </div>
    </div>

</body>
<script type="module" src="./js-filse/checkout-js/checkout.js"></script>
</html>
